<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Clicker Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      margin: 0;
    }

    .wrap {
      background: #1b1b1b;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      text-align: center;
      width: min(92vw, 420px);
    }

    h1 {
      margin: 0 0 10px;
    }

    #score {
      font-size: 3rem;
      font-weight: 700;
      margin: 12px 0;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    #clickBtn {
      background: #4f7cff;
      color: #fff;
      width: 100%;
    }

    #upgradeBtn {
      background: #22c55e;
      color: #fff;
      width: 100%;
      margin-top: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      flex: 1;
      background: #222;
      padding: 12px;
      border-radius: 12px;
    }

    .small {
      opacity: .8;
      font-size: .9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Clicker Game</h1>
    <div id="score">0</div>
    <div class="small">Clicks: <span id="clicks">0</span> | Per click: <span id="power">1</span></div>
    <button id="clickBtn">Click me!</button>
    <button id="upgradeBtn">Upgrade (Cost: <span id="cost">10</span>)</button>

    <div class="row">
      <div class="stat">Auto save: <span class="small">on refresh</span></div>
      <div class="stat">Goal: <span class="small">get huge</span></div>
    </div>
  </div>

  <script>
    let score = Number(localStorage.getItem('score')) || 0;
    let clicks = Number(localStorage.getItem('clicks')) || 0;
    let power = Number(localStorage.getItem('power')) || 1;
    let cost = Number(localStorage.getItem('cost')) || 10;

    const scoreEl = document.getElementById('score');
    const clicksEl = document.getElementById('clicks');
    const powerEl = document.getElementById('power');
    const costEl = document.getElementById('cost');
    const clickBtn = document.getElementById('clickBtn');
    const upgradeBtn = document.getElementById('upgradeBtn');

    function save() {
      localStorage.setItem('score', score);
      localStorage.setItem('clicks', clicks);
      localStorage.setItem('power', power);
      localStorage.setItem('cost', cost);
    }

    function render() {
      scoreEl.textContent = score;
      clicksEl.textContent = clicks;
      powerEl.textContent = power;
      costEl.textContent = cost;
      upgradeBtn.textContent = `Upgrade (Cost: ${cost})`;
      upgradeBtn.disabled = score < cost;
      upgradeBtn.style.opacity = upgradeBtn.disabled ? 0.6 : 1;
    }

    clickBtn.addEventListener('click', () => {
      score += power;
      clicks += 1;
      save();
      render();
    });

    upgradeBtn.addEventListener('click', () => {
      if (score >= cost) {
        score -= cost;
        power += 1;
        cost = Math.floor(cost * 1.6 + 5);
        save();
        render();
      }
    });

    render();
  </script>
</body>
</html>
